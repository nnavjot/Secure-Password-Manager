{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto;">
  <h2>Add New Password</h2>
  <form method="POST">
<div style="display:flex;gap:10px;margin-top:4px;">
      <button type="submit" style="flex:1;">Save Password</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="flex:1;text-align:center;">Cancel</a>
    </div>
    <label>Password</label>
    <div style="display:flex;gap:8px;align-items:center;margin:6px 0 14px;">
      <input type="text" name="password" id="password" required placeholder="Enter or generate a password"
             style="margin:0;flex:1;">
      <button type="button" onclick="generatePw()" class="btn" style="white-space:nowrap;">
        Generate
      </button>
    </div>

    
  </form>
</div>

<script>
  function generatePw() {
    fetch("{{ url_for('generate_password') }}")
      .then(r => r.text())
      .then(pw => { document.getElementById("password").value = pw; });
  }
</script>
{% endblock %}
