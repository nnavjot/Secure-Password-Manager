<!DOCTYPE html>
<html>
<head>
    <title>Add Password</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; }
        input { display: block; width: 100%; margin: 8px 0; padding: 8px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; margin-right: 8px; }
        a { color: #008CBA; }
    </style>
</head>
<body>
    <h2>Add New Password</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="site" placeholder="Website (e.g. github.com)" required>
        <input type="text" name="username" placeholder="Username or email" required>
        <input type="text" name="password" id="pw" placeholder="Password" required>
        <button type="button" onclick="generatePassword()">Generate Password</button>
        <br><br>
        <button type="submit">Save</button>
        <a href="/dashboard">Cancel</a>
    </form>

    <script>
        function generatePassword() {
            fetch("/generate")
                .then(r => r.json())
                .then(data => {
                    document.getElementById("pw").value = data.password;
                });
        }
    </script>
</body>
</html>
