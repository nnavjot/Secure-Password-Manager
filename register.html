{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:0 auto;">
  <h2>Create Account</h2>
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" required autofocus>
    <label>Master Password <span style="font-weight:normal;font-size:12px;">(min 8 characters)</span></label>
    <input type="password" name="password" required minlength="8">
    <button type="submit" style="width:100%;margin-top:6px;">Register</button>
  </form>
  <p style="margin-top:16px;font-size:13px;text-align:center;">
    Already have an account? <a href="{{ url_for('login') }}" style="color:#2c4f8c;">Login</a>
  </p>
</div>
{% endblock %}
